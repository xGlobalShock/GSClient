<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
<title>GS Center Startup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #00F2FF;
    --secondary: #00F2FF;
    --bg: #030406;
  }

  html, body {
    margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden;
    background: var(--bg); font-family: 'Orbitron', 'Space Grotesk', system-ui, -apple-system, sans-serif;
    -webkit-app-region: drag; user-select: none; color: #fff;
  }

  /* Background Aesthetics */
  .ambient-flare {
    position: absolute; inset: 0; z-index: 1; pointer-events: none;
    background: radial-gradient(circle at center 40%, rgba(0, 242, 255, 0.15) 0%, transparent 60%);
    mix-blend-mode: screen;
  }

  /* 3D Sweeping Floor Grid */
  .grid-wrap {
    position: absolute; inset: 0; z-index: 0; overflow: hidden; perspective: 800px;
  }

  .grid-plane {
    position: absolute; left: -50%; right: -50%; bottom: -30%; height: 130%;
    background-image: 
      linear-gradient(rgba(0, 242, 255, 0.15) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 242, 255, 0.15) 1px, transparent 1px);
    background-size: 35px 35px;
    transform-origin: center top;
    transform: rotateX(75deg) translateY(0);
    animation: gridTravel 1.5s linear infinite;
    mask-image: linear-gradient(to top, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 70%);
    -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 70%);
  }
  @keyframes gridTravel { from { transform: rotateX(75deg) translateY(0); } to { transform: rotateX(75deg) translateY(35px); } }

  /* CRT Scan Lines */
  .scan-overlay {
    position: absolute; inset: 0; z-index: 99; pointer-events: none;
    background: repeating-linear-gradient(to bottom, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
  }

  /* Main Layout - Guarantees perfect bounds inside any Splash Dimension */
  .splash-container {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; justify-content: space-between;
    width: 100vw; height: 100vh; padding: 24px 32px; box-sizing: border-box;
  }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: center; }
  
  .status-badge {
    display: flex; align-items: center; gap: 8px; font-family: 'Consolas', monospace;
    font-size: 10px; color: rgb(255, 255, 255); letter-spacing: 2px;
  }
  
  .pulse-dot {
    width: 6px; height: 6px; background: #ff3366; border-radius: 50%;
    box-shadow: 0 0 10px #ff3366; animation: redPulse 1.5s infinite;
  }
  
  @keyframes redPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

  .version { 
    font-family: 'Consolas', monospace; 
    font-size: 10px; 
    color: rgba(0, 242, 255, 1); 
    letter-spacing: 2px; 
  }

  /* Center Identity */
  .identity { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; margin-top: -10px; }
  .hologram-wrap { position: relative; width: 300px; height: 300px; margin-bottom: -25px; }
  .holo-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; animation: floatHolo 4s ease-in-out infinite alternate; }
  .holo-icon img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 16px rgba(0,242,255,0.6)); }
  @keyframes drawLine { to { stroke-dashoffset: 0; } }
  @keyframes floatHolo { from { transform: translateY(-3px); } to { transform: translateY(3px); } }
  
  .hologram-base {
    position: absolute; bottom: -16px; left: 25px; right: 25px; height: 12px;
    background: rgba(0,242,255,0.5); border-radius: 50%; filter: blur(8px);
    animation: shadowPulse 4s ease-in-out infinite alternate;
  }
  @keyframes shadowPulse { from { transform: scale(0.9); opacity: 0.3; } to { transform: scale(1.1); opacity: 0.8; } }

  .title-wrap h1 {
    font-size: 28px; font-weight: 800; letter-spacing: 12px; margin: 0; padding-left: 12px;
    background: linear-gradient(to right, #ffffff, #00F2FF); -webkit-background-clip: text; background-clip: text; color: transparent;
    text-transform: uppercase; text-shadow: 0 0 25px rgba(0, 242, 255, 0.4);
  }

  /* Loading Footer */
  .loading-footer { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .loading-info { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }
  .status-msg { font-family: 'Ubuntu', sans-serif; font-size: 10px; color: #a0e8f0; text-transform: none; }
  .hardware-details { display: none; }
  .status-msg { font-size: 12px; }
  .percentage { font-family: 'Consolas', monospace; font-size: 24px; font-weight: 700; color: #00F2FF; text-shadow: 0 0 12px rgba(0,242,255,0.6); line-height: 1; }

  /* Glow Blade Engine */
  .progress-blade {
    width: 100%; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px;
    overflow: hidden; position: relative; box-shadow: inset 0 1px 3px rgba(0,0,0,0.8);
  }
  .blade-fill {
    height: 100%; width: 0%; background: linear-gradient(90deg, rgba(0,100,140,0.8), #00F2FF, var(--primary));
    box-shadow: 0 0 12px var(--primary); transition: width 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    position: relative; border-radius: 2px;
  }
  .blade-glint {
    position: absolute; right: 0; top: 0; bottom: 0; width: 60px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
    mix-blend-mode: overlay; animation: glintSweep 1s linear infinite;
  }
  @keyframes glintSweep { 0% { transform: translateX(-60px); } 100% { transform: translateX(60px); } }

  /* Update mode overlay */
  .update-overlay {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 32px;
    box-sizing: border-box;
    background: rgba(3, 4, 6, 0.72);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    animation: updateFadeIn 0.4s ease forwards;
  }
  .update-overlay.visible { display: flex; }
  @keyframes updateFadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }

  .update-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0, 242, 255, 0.08);
    border: 1px solid rgba(0, 242, 255, 0.25);
    border-radius: 3px;
    padding: 5px 14px;
    margin-bottom: 22px;
    font-family: 'Consolas', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: #00f2ff;
    text-transform: uppercase;
  }
  .update-badge-dot {
    width: 6px; height: 6px;
    background: #00f2ff;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(0,242,255,0.8);
    animation: updateDotBlink 1.2s ease-in-out infinite;
  }
  @keyframes updateDotBlink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .update-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 6px;
    text-transform: uppercase;
    background: linear-gradient(to right, #ffffff, #00f2ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 6px;
  }
  .update-version {
    font-family: 'Consolas', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(0,242,255,0.6);
    margin-bottom: 28px;
  }

  .update-bar-wrap {
    width: 100%;
    max-width: 280px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .update-bar-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .update-bar-label {
    font-family: 'Consolas', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
  }
  .update-bar-pct {
    font-family: 'Consolas', monospace;
    font-size: 18px;
    font-weight: 700;
    color: #00f2ff;
    text-shadow: 0 0 12px rgba(0,242,255,0.6);
    line-height: 1;
  }
  .update-bar-track {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }
  .update-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, rgba(0,100,140,0.8), #00f2ff);
    box-shadow: 0 0 10px rgba(0,242,255,0.5);
    border-radius: 2px;
    transition: width 0.35s cubic-bezier(0.25,1,0.5,1);
  }

  .update-foot {
    margin-top: 20px;
    font-family: 'Consolas', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
  }
  .update-error-msg {
    margin-top: 16px;
    font-size: 10px;
    color: #ff4d6a;
    letter-spacing: 1px;
    text-align: center;
  }

  /* Fade out — GPU-composited for smooth exit */
  .splash-container { will-change: opacity, transform; }
  .fade-out {
    animation: fadeFrame 0.5s cubic-bezier(0.4, 0, 1, 1) forwards;
    pointer-events: none;
  }
  @keyframes fadeFrame { to { opacity: 0; transform: scale(1.015); filter: blur(3px); } }
  .fade-out-bg {
    animation: fadeBg 0.5s cubic-bezier(0.4, 0, 1, 1) forwards;
    pointer-events: none;
  }
  @keyframes fadeBg { to { opacity: 0; } }
</style>
</head>
<body>
  
  <div class="ambient-flare"></div>
  <div class="grid-wrap"><div class="grid-plane"></div></div>
  <div class="scan-overlay"></div>

  <!-- Update overlay (hidden until update is detected) -->
  <div class="update-overlay" id="updateOverlay">
    <div class="update-badge"><span class="update-badge-dot"></span>UPDATE AVAILABLE</div>
    <div class="update-title">GS CENTER</div>
    <div class="update-version" id="updateVersionLabel">DOWNLOADING…</div>
    <div class="update-bar-wrap">
      <div class="update-bar-row">
        <span class="update-bar-label" id="updateBarLabel">Downloading</span>
        <span class="update-bar-pct" id="updateBarPct">0%</span>
      </div>
      <div class="update-bar-track">
        <div class="update-bar-fill" id="updateBarFill"></div>
      </div>
    </div>
    <div class="update-foot">Do not close the application</div>
    <div class="update-error-msg" id="updateErrorMsg" style="display:none"></div>
  </div>

  <div class="splash-container" id="content">
    
    <div class="header">
      <div class="status-badge"><span class="pulse-dot"></span> APP_BOOT</div>
      <div class="version" id="versionTag">LOADING...</div>
    </div>

    <!-- Holographic Central Branding -->
    <div class="identity">
      <div class="hologram-wrap">
        <div class="hologram-base"></div>
        <div class="holo-icon">
          <img src="app-icons/gs-center.png" alt="GS Center" />
        </div>
      </div>
      <div class="title-wrap">
        <!-- <h1 class="main-title">GS CENTER</h1> -->
      </div>
    </div>

    <!-- Footer Progress Element -->
    <div class="loading-footer">
      <div class="loading-info">
        <span class="status-msg" id="status">INITIALIZING CORE...</span>
        <span class="percentage" id="progressPct">0%</span>
      </div>
      <div class="hardware-details" id="hardwareDetails">Waiting for hardware discovery...</div>
      <div class="progress-blade">
        <div class="blade-fill" id="progressFill">
          <div class="blade-glint"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Use the secure splashAPI bridge (exposed via splash-preload.js)
    const api = window.splashAPI;

    api.onVersion((v) => {
      document.getElementById('versionTag').textContent = 'v' + (v || '1.0.0');
    });

    let statusDotTimer = null;

    const setStatusText = (text) => {
      const statusEl = document.getElementById('status');
      if (!statusEl) return;

      if (statusDotTimer) {
        clearInterval(statusDotTimer);
        statusDotTimer = null;
      }

      const discoverMatch = /^discovering\s+(.+)$/i.exec(text);
      if (discoverMatch) {
        let base = `Discovering ${discoverMatch[1]}`;
        let dots = 0;
        statusEl.textContent = `${base}`;

        statusDotTimer = setInterval(() => {
          dots = (dots + 1) % 4; // 0..3
          const dotText = '.'.repeat(dots);
          statusEl.textContent = `${base}${dotText}`;
        }, 400);
      } else {
        statusEl.textContent = text;
      }
    };

    api.onStatus((msg) => {
      setStatusText(msg);
    });

    let currentPct = 0;
    let displayPct = 0;
    let percentAnimation = null;
    let lastProgressTime = performance.now();

    const setPercent = (targetPct) => {
      const fill = document.getElementById('progressFill');
      const pctText = document.getElementById('progressPct');
      targetPct = Math.min(100, Math.max(0, targetPct));

      // Never go backwards (except for explicit 100%)
      if (targetPct <= displayPct && targetPct < 100) return;

      lastProgressTime = performance.now();

      if (percentAnimation) {
        cancelAnimationFrame(percentAnimation);
        percentAnimation = null;
      }

      const startPct = displayPct;
      const diff = targetPct - startPct;
      if (diff <= 0) return;

      const duration = Math.min(600, Math.max(150, diff * 12));
      const startTime = performance.now();

      const animate = (time) => {
        const progress = Math.min(1, (time - startTime) / duration);
        const eased = startPct + diff * (1 - Math.pow(1 - progress, 3));

        displayPct = eased;
        fill.style.width = `${eased}%`;
        pctText.textContent = `${Math.round(eased)}%`;

        if (progress < 1) {
          percentAnimation = requestAnimationFrame(animate);
        } else {
          displayPct = targetPct;
          currentPct = targetPct;
          fill.style.width = `${targetPct}%`;
          pctText.textContent = `${Math.round(targetPct)}%`;
          percentAnimation = null;
        }
      };

      percentAnimation = requestAnimationFrame(animate);
    };

    // Trickle: slowly advance progress when no updates received (prevents visual stall)
    const trickleTimer = setInterval(() => {
      const elapsed = performance.now() - lastProgressTime;
      if (elapsed > 1200 && displayPct > 0 && displayPct < 92) {
        setPercent(Math.min(92, Math.round(displayPct + 0.4)));
      }
    }, 200);

    api.onProgress((pct) => {
      setPercent(pct);
    });

    let hardwareDetailsLines = ['Waiting for hardware discovery...'];
    let hardwareDetailsIndex = 0;
    let hardwareDetailsTimer = null;

    const renderHardwareDetail = (idx) => {
      const detailsEl = document.getElementById('hardwareDetails');
      if (!detailsEl) return;

      detailsEl.innerHTML = '';
      hardwareDetailsLines.forEach((line, i) => {
        const span = document.createElement('span');
        span.textContent = line;
        span.classList.toggle('active', i === idx);
        detailsEl.appendChild(span);
      });
    };

    const updateHardwareDetails = (text) => {
      const detailsEl = document.getElementById('hardwareDetails');
      if (!detailsEl) return;

      hardwareDetailsLines = String(text || 'Hardware discovery in progress...')
        .split('\n')
        .map(s => s.trim())
        .filter(Boolean);

      if (hardwareDetailsLines.length === 0) {
        hardwareDetailsLines = ['Hardware discovery in progress...'];
      }

      hardwareDetailsIndex = 0;
      renderHardwareDetail(hardwareDetailsIndex);

      if (hardwareDetailsTimer) {
        clearInterval(hardwareDetailsTimer);
      }

      hardwareDetailsTimer = setInterval(() => {
        hardwareDetailsIndex = (hardwareDetailsIndex + 1) % hardwareDetailsLines.length;
        renderHardwareDetail(hardwareDetailsIndex);
      }, 2000); // slower rotation
    };

    api.onDetails((details) => {
      updateHardwareDetails(details);
    });

    api.onDone(() => {
      clearInterval(trickleTimer);
      if (hardwareDetailsTimer) {
        clearInterval(hardwareDetailsTimer);
        hardwareDetailsTimer = null;
      }
      if (statusDotTimer) {
        clearInterval(statusDotTimer);
        statusDotTimer = null;
      }
      if (percentAnimation) {
        cancelAnimationFrame(percentAnimation);
        percentAnimation = null;
      }

      setStatusText('Starting GS Center...');
      setPercent(100);
      currentPct = 100;
      displayPct = 100;

      // Brief pause at 100% so the user sees completion, then fade out
      setTimeout(() => {
        const content = document.getElementById('content');
        const flare = document.querySelector('.ambient-flare');
        const gridWrap = document.querySelector('.grid-wrap');
        const scanOverlay = document.querySelector('.scan-overlay');

        // Fade all layers for a clean exit
        if (flare) flare.classList.add('fade-out-bg');
        if (gridWrap) gridWrap.classList.add('fade-out-bg');
        if (scanOverlay) scanOverlay.classList.add('fade-out-bg');

        if (content) {
          content.classList.add('fade-out');
          content.addEventListener('animationend', () => {
            api.sendFadeComplete();
          }, { once: true });
          // Safety timeout in case animationend never fires
          setTimeout(() => {
            api.sendFadeComplete();
          }, 800);
        } else {
          api.sendFadeComplete();
        }
      }, 150);
    });

    // ── Update mode handlers ──────────────────────────────────────────────
    api.onUpdateFound((data) => {
      // Freeze the normal progress bar and reveal the update overlay
      clearInterval(trickleTimer);
      if (statusDotTimer)   { clearInterval(statusDotTimer);   statusDotTimer   = null; }
      if (percentAnimation) { cancelAnimationFrame(percentAnimation); percentAnimation = null; }

      const overlay = document.getElementById('updateOverlay');
      if (overlay) overlay.classList.add('visible');

      const versionLabel = document.getElementById('updateVersionLabel');
      if (versionLabel && data && data.version) {
        versionLabel.textContent = 'v' + data.version + ' — DOWNLOADING\u2026';
      }
    });

    api.onUpdateProgress((data) => {
      const pct = Math.min(100, Math.max(0, Math.round(data.percent || 0)));
      const fill  = document.getElementById('updateBarFill');
      const pctEl = document.getElementById('updateBarPct');
      const label = document.getElementById('updateBarLabel');

      if (fill)  fill.style.width = pct + '%';
      if (pctEl) pctEl.textContent = pct + '%';

      if (pct >= 100) {
        if (label)  label.textContent  = 'Installing';
        const versionLabel = document.getElementById('updateVersionLabel');
        if (versionLabel) versionLabel.textContent = 'INSTALLING UPDATE\u2026';
      }
    });

    api.onUpdateError((data) => {
      const errEl = document.getElementById('updateErrorMsg');
      if (errEl) {
        errEl.textContent = (data && data.message) ? data.message : 'Update failed. Please restart.';
        errEl.style.display = 'block';
      }
      const label = document.getElementById('updateBarLabel');
      if (label) label.textContent = 'Error';
    });
  </script>
</body>
</html>
